<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의 | Partnership Inquiry</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="form-wrapper">
      <div class="header">
        <h1>제휴 문의</h1>
        <p>함께 혁신적인 가치를 만들어갈 파트너를 기다립니다.</p>
      </div>
      
      <form id="partnership-form" action="https://formspree.io/f/mqewanqn" method="POST">
        <div class="input-group">
          <label for="full-name">성함 / 담당자명</label>
          <input type="text" id="full-name" name="name" required placeholder="홍길동">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" required placeholder="example@company.com">
          </div>
          <div class="input-group">
            <label for="organization">소속 (회사/단체)</label>
            <input type="text" id="organization" name="organization" required placeholder="주식회사 예시">
          </div>
        </div>

        <div class="input-group">
          <label for="subject">문의 제목</label>
          <input type="text" id="subject" name="subject" required placeholder="제휴 제안의 핵심 내용을 적어주세요">
        </div>

        <div class="input-group">
          <label for="message">상세 내용</label>
          <textarea id="message" name="message" required placeholder="제안하시고자 하는 내용을 상세히 입력해 주세요."></textarea>
        </div>

        <button type="submit" id="submit-btn">제휴 문의 보내기</button>
        
        <div id="status-message" class="status-message hidden">
          <p id="status-text"></p>
        </div>
      </form>

    </section>

    <section class="comments-wrapper">
      <div class="comments-header">
        <h2>의견 남기기</h2>
        <p>프로젝트에 대한 의견이나 제휴 문의 관련 댓글을 남겨주세요.</p>
      </div>
      <div id="disqus_thread">
        <p style="text-align: center; color: var(--text-muted);">댓글창을 불러오는 중입니다...</p>
      </div>
      <script>
          /**
           * Disqus 최종 디버깅 및 실행 코드
           */
          console.log("=== Disqus 시스템 체크 시작 ===");
          
          var disqus_config = function () {
              this.page.url = window.location.href.split(/[?#]/)[0]; // 쿼리 스트링 제거된 깨끗한 URL
              this.page.identifier = window.location.pathname;
              console.log("1. 설정된 URL: " + this.page.url);
              console.log("2. 설정된 ID: " + this.page.identifier);
          };

          (function() {
              var d = document, s = d.createElement('script');
              // 캐시 방지 및 최신 버전 강제 로드
              s.src = 'https://hyoseong.disqus.com/embed.js';
              s.setAttribute('data-timestamp', +new Date());
              
              // 5초 후에도 댓글창이 안 뜨면 안내 문구 출력
              var timeout = setTimeout(function() {
                  var thread = document.getElementById('disqus_thread');
                  if (thread && thread.innerHTML.includes('불러오는 중')) {
                      console.warn("Disqus 로딩 지연 중... 설정을 확인하세요.");
                      thread.innerHTML = `
                        <div style="text-align: center; padding: 20px; border: 1px dashed #ccc; border-radius: 12px;">
                          <p style="color: #ff4b4b; font-weight: bold; margin-bottom: 10px;">댓글창 로딩이 지연되고 있습니다.</p>
                          <p style="font-size: 0.9rem; color: #666;">
                            1. Disqus Admin에서 <b>hyoseong</b> Shortname이 정확한지 확인<br>
                            2. <b>cvs4008a.github.io</b>가 Trusted Domains에 등록되었는지 확인<br>
                            3. 브라우저의 <b>광고 차단기(AdBlock)</b>를 끄고 확인
                          </p>
                        </div>`;
                  }
              }, 5000);

              s.onload = function() {
                  console.log("3. 결과: Disqus 서버 연결 성공!");
                  clearTimeout(timeout);
              };
              
              s.onerror = function() {
                  console.error("3. 결과: 스크립트 파일 자체를 찾을 수 없습니다 (Shortname 오류 확률 높음)");
                  clearTimeout(timeout);
              };

              (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
