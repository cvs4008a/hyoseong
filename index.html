<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의 | Partnership Inquiry</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="form-wrapper">
      <div class="header">
        <h1>제휴 문의</h1>
        <p>함께 혁신적인 가치를 만들어갈 파트너를 기다립니다.</p>
      </div>
      
      <form id="partnership-form" action="https://formspree.io/f/mqewanqn" method="POST">
        <div class="input-group">
          <label for="full-name">성함 / 담당자명</label>
          <input type="text" id="full-name" name="name" required placeholder="홍길동">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" required placeholder="example@company.com">
          </div>
          <div class="input-group">
            <label for="organization">소속 (회사/단체)</label>
            <input type="text" id="organization" name="organization" required placeholder="주식회사 예시">
          </div>
        </div>

        <div class="input-group">
          <label for="subject">문의 제목</label>
          <input type="text" id="subject" name="subject" required placeholder="제휴 제안의 핵심 내용을 적어주세요">
        </div>

        <div class="input-group">
          <label for="message">상세 내용</label>
          <textarea id="message" name="message" required placeholder="제안하시고자 하는 내용을 상세히 입력해 주세요."></textarea>
        </div>

        <button type="submit" id="submit-btn">제휴 문의 보내기</button>
        
        <div id="status-message" class="status-message hidden">
          <p id="status-text"></p>
        </div>
      </form>

    </section>

    <section class="comments-wrapper">
      <div class="comments-header">
        <h2>의견 남기기</h2>
        <p>프로젝트에 대한 의견이나 제휴 문의 관련 댓글을 남겨주세요.</p>
      </div>
      <div id="disqus_thread" style="min-height: 250px; border: 1.5px solid var(--border); border-radius: 12px; padding: 20px;">
        <p id="disqus-status" style="text-align: center; color: var(--primary); font-weight: bold;">
          댓글 시스템 진단 중... (v3.1)
        </p>
      </div>

      <script>
          /**
           * Disqus v3.1 - 에러 자가 진단 및 로딩 코드
           */
          (function() {
              var status = document.getElementById('disqus-status');
              
              window.disqus_config = function () {
                  this.page.url = 'https://cvs4008a.github.io/hyoseong/';
                  this.page.identifier = '/hyoseong/';
              };

              var d = document, s = d.createElement('script');
              // Shortname 'hyoseong-1' 적용
              s.src = 'https://hyoseong-1.disqus.com/embed.js';
              s.setAttribute('data-timestamp', +new Date());
              
              // 5초 후에도 응답 없으면 안내
              var timer = setTimeout(function() {
                  if (status) {
                      status.innerHTML = `
                        <div style="color: #3498db; text-align: left; padding: 10px;">
                          <p style="font-weight: bold; margin-bottom: 10px;">⚠️ 로딩 지연 중 (도메인 확인 필요)</p>
                          <p style="font-size: 0.85rem; font-weight: normal; line-height: 1.6;">
                            코드는 정확합니다. 아래 설정을 확인해주세요:<br>
                            1. <b>Disqus Admin > Settings > General</b> 접속<br>
                            2. <b>Trusted Domains</b>에 <b>cvs4008a.github.io</b> 등록 확인<br>
                            3. <b>광고 차단기(AdBlock)</b> 또는 <b>트래커 차단</b> 해제
                          </p>
                        </div>`;
                  }
              }, 5000);

              s.onload = function() {
                  clearTimeout(timer);
                  if (status) status.parentElement.style.display = 'none';
              };
              
              s.onerror = function() {
                  clearTimeout(timer);
                  if (status) {
                      status.innerHTML = `
                        <div style="color: #e74c3c; text-align: center;">
                          <p style="font-weight: bold; margin-bottom: 10px;">❌ 로드 실패 (Shortname 오류)</p>
                          <p style="font-size: 0.85rem; font-weight: normal;">
                            'hyoseong-1.disqus.com' 서버를 찾을 수 없습니다.<br>
                            아이디가 <b>hyoseong-1</b>이 맞는지 다시 확인해주세요.
                          </p>
                        </div>`;
                  }
              };

              (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
    <p style="text-align: center; font-size: 0.8rem; color: #ccc; margin-top: 2rem;">[v3.1 - 자가 진단 버전]</p>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
