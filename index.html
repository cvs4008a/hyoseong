<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-5372181264998864">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372181264998864" crossorigin="anonymous"></script>
  <title>동물상 테스트 | 강아지 vs 고양이</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAuSURBVHgB7dAxAQAACMCwqcM6ZisLCH6D6O78C0YDAoFAIBAYEAgEAgOBQCB4AgN75ALrX04B9AAAAABJRU5ErkJggg==">
  <link rel="stylesheet" href="style.css?v=3.2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- TensorFlow.js and Teachable Machine Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <main class="container">
    <section class="card-wrapper main-card">
      <div class="header">
        <h1>🐶 동물상 테스트 🐱</h1>
        <p>인공지능이 분석하는 나의 동물상! 나는 강아지상일까, 고양이상일까?</p>
      </div>

      <div class="test-area">
        <!-- Model Loading Indicator -->
        <div id="model-loading" class="loading-overlay">
          <div class="spinner"></div>
          <p>인공지능 모델을 불러오는 중...</p>
        </div>

        <!-- Upload & Capture Zone -->
        <div id="upload-zone" class="upload-zone">
          <input type="file" id="image-upload" accept="image/*" hidden>
          <div class="upload-content" onclick="document.getElementById('image-upload').click()">
            <div class="upload-icon">📸</div>
            <p>사진을 업로드하거나 클릭하여 촬영하세요</p>
            <span class="upload-hint">(파일을 여기로 드래그해도 됩니다)</span>
          </div>
        </div>

        <!-- Image Preview -->
        <div id="image-preview-container" class="image-preview-container hidden">
          <img id="face-image" src="" alt="나의 사진">
          <button id="re-upload-btn" class="btn-secondary">다시 찍기</button>
        </div>

        <!-- Prediction Button -->
        <div id="action-area" class="action-area hidden">
          <button id="predict-btn" class="btn-primary">결과 확인하기</button>
        </div>

        <!-- Result Section -->
        <div id="result-container" class="result-container hidden">
          <div class="result-header">
            <h2 id="result-title">당신은 강아지상입니다!</h2>
          </div>
          <div class="result-bars">
            <div class="label-container">
              <span>강아지상</span>
              <div class="bar-bg"><div id="dog-bar" class="bar-fill dog-color" style="width: 0%"></div></div>
              <span id="dog-percent">0%</span>
            </div>
            <div class="label-container">
              <span>고양이상</span>
              <div class="bar-bg"><div id="cat-bar" class="bar-fill cat-color" style="width: 0%"></div></div>
              <span id="cat-percent">0%</span>
            </div>
          </div>
          <p id="result-message" class="result-message"></p>
        </div>
      </div>
    </section>

    <!-- Comments Section -->
    <section class="comments-wrapper">
      <div class="comments-header">
        <h2>의견 남기기</h2>
        <p>테스트 결과에 대해 의견을 나눠보세요!</p>
      </div>
      <div id="disqus_thread"></div>
      <script>
        var disqus_shortname = 'hyoseong-1'; 
        (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
