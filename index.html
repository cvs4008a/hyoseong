<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의 | Partnership Inquiry</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="form-wrapper">
      <div class="header">
        <h1>제휴 문의</h1>
        <p>함께 혁신적인 가치를 만들어갈 파트너를 기다립니다.</p>
      </div>
      
      <form id="partnership-form" action="https://formspree.io/f/mqewanqn" method="POST">
        <div class="input-group">
          <label for="full-name">성함 / 담당자명</label>
          <input type="text" id="full-name" name="name" required placeholder="홍길동">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" required placeholder="example@company.com">
          </div>
          <div class="input-group">
            <label for="organization">소속 (회사/단체)</label>
            <input type="text" id="organization" name="organization" required placeholder="주식회사 예시">
          </div>
        </div>

        <div class="input-group">
          <label for="subject">문의 제목</label>
          <input type="text" id="subject" name="subject" required placeholder="제휴 제안의 핵심 내용을 적어주세요">
        </div>

        <div class="input-group">
          <label for="message">상세 내용</label>
          <textarea id="message" name="message" required placeholder="제안하시고자 하는 내용을 상세히 입력해 주세요."></textarea>
        </div>

        <button type="submit" id="submit-btn">제휴 문의 보내기</button>
        
        <div id="status-message" class="status-message hidden">
          <p id="status-text"></p>
        </div>
      </form>

    </section>

    <section class="comments-wrapper">
      <div class="comments-header">
        <h2>의견 남기기</h2>
        <p>프로젝트에 대한 의견이나 제휴 문의 관련 댓글을 남겨주세요.</p>
      </div>
      <div id="disqus_thread" style="min-height: 300px; border: 2px dashed var(--border); border-radius: 12px; padding: 30px; display: flex; align-items: center; justify-content: center;">
        <div id="disqus-status" style="text-align: center; line-height: 1.8;">
          <p style="color: var(--primary); font-weight: bold; font-size: 1.1rem;">
            댓글 시스템 연결 시도 중... (v2.1)
          </p>
          <p style="color: #666; font-size: 0.9rem; margin-top: 10px;">
            5초 이상 변화가 없다면 아래 설정을 확인해주세요.
          </p>
        </div>
      </div>

      <script>
          /**
           * Disqus v2.1 - 최종 상태 진단
           */
          (function() {
              var status = document.getElementById('disqus-status');
              
              window.disqus_config = function () {
                  this.page.url = window.location.href.split(/[?#]/)[0];
                  this.page.identifier = window.location.pathname;
              };

              var d = document, s = d.createElement('script');
              // 'hyoseong'이 정확한 Shortname인지 관리자 페이지 URL에서 확인 필수!
              s.src = 'https://hyoseong.disqus.com/embed.js';
              s.setAttribute('data-timestamp', +new Date());
              
              var timer = setTimeout(function() {
                  if (status) {
                      status.innerHTML = `
                        <div style="color: #3498db; font-weight: bold;">
                          <p style="font-size: 1.1rem; margin-bottom: 15px;">⚠️ 도메인 승인 대기 중 또는 차단됨</p>
                          <div style="text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; font-weight: normal; font-size: 0.85rem; color: #444;">
                            1. <b>Disqus Admin > Settings</b> 접속<br>
                            2. <b>Trusted Domains</b>에 <b>cvs4008a.github.io</b> 추가<br>
                            3. 하단 <b>Save Changes</b> 버튼 클릭<br>
                            4. 브라우저 <b>광고 차단기(AdBlock)</b> 해제
                          </div>
                        </div>`;
                  }
              }, 5000);

              s.onload = function() {
                  clearTimeout(timer);
                  if (status) status.parentElement.style.display = 'none';
              };
              
              s.onerror = function() {
                  clearTimeout(timer);
                  if (status) {
                      status.innerHTML = `
                        <div style="color: #e74c3c; font-weight: bold;">
                          <p style="font-size: 1.1rem; margin-bottom: 15px;">❌ Shortname 설정 오류</p>
                          <p style="font-weight: normal; font-size: 0.85rem; color: #444;">
                            'hyoseong'이라는 이름의 Disqus 사이트를 찾을 수 없습니다.<br>
                            관리자 페이지 URL(예: abcd.disqus.com)에서 <b>abcd</b> 부분을 확인해 주세요.
                          </p>
                        </div>`;
                  }
              };

              (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
    <p style="text-align: center; font-size: 0.8rem; color: #ccc; margin-top: 2rem;">[v2.1 - 최신 버전]</p>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
